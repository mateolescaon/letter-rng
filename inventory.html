<!DOCTYPE html>
<html>
<head>
  <title>Inventory</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 340px;
      background: #111;
      border: 1px solid #333;
      padding: 20px;
      text-align: center;
    }

    h2 {
      margin-top: 0;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 6px;
      border-bottom: 1px solid #222;
      color: #ccc;
    }

    .empty {
      color: #666;
      margin: 20px 0;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #222;
      border: 1px solid #444;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .back {
      display: block;
      margin-top: 10px;
      color: #aaa;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🎒 Inventory</h2>

  <div id="list"></div>

  <button onclick="clearInv()">Clear Inventory</button>

  <a class="back" href="index.html">← Back to Menu</a>
</div>

<script>
  let inventory = JSON.parse(localStorage.getItem("inv")) || {};

  function render(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    const entries = Object.entries(inventory);

    if(entries.length === 0){
      list.innerHTML = "<div class='empty'>No items yet</div>";
      return;
    }

    entries
      .sort((a,b)=>b[1]-a[1])
      .forEach(([item,count])=>{
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<span>${item}</span><span>x${count}</span>`;
        list.appendChild(div);
      });
  }

  function clearInv(){
    if(confirm("Clear inventory?")){
      inventory = {};
      localStorage.removeItem("inv");
      render();
    }
  }

  render();
</script>

</body>
</html>
