<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .board {
      width: 300px;
      height: 420px;
      background: #111;
      border: 1px solid #333;
      padding: 10px;
      overflow-y: auto;
      border-radius: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .title {
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="board">
  <div class="title">Leaderboard</div>
  <div id="list"></div>
</div>

<script>
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

// MUST match your game key exactly
let inventory = JSON.parse(localStorage.getItem("inv")) || {};

function getColor(letter){
  if(letter === "0") return "darkred";

  const i = letters.indexOf(letter);
  const rank = Math.floor(i / 3);

  const colors = [
    "#2ecc71","#27ae60","#a3e635",
    "#f1c40f","#f39c12","#e67e22",
    "#e74c3c","#c0392b","#ff0000"
  ];

  return colors[rank] || "#aaa";
}

function load(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  const entries = Object.entries(inventory);

  if(entries.length === 0){
    list.innerHTML = "<div>No data yet — roll first</div>";
    return;
  }

  entries
    .sort((a,b)=>b[1]-a[1])
    .forEach(([k,v])=>{
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <span style="color:${getColor(k)}">${k}</span>
        <span style="color:${getColor(k)}">x${v}</span>
      `;

      list.appendChild(div);
    });
}

load();
</script>

</body>
</html>
