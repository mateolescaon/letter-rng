<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .board {
      width: 320px;
      height: 420px;
      background: #111;
      border: 1px solid #333;
      padding: 12px;
      overflow-y: auto;
      border-radius: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .exit {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 35px;
      height: 35px;
      background: #111;
      border: 1px solid #333;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="exit" onclick="goHub()">✕</div>

<div class="board">
  <b>Leaderboard</b>
  <div id="list"></div>
</div>

<script>
function goHub(){
  window.location.href="index.html";
}

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let inventory=JSON.parse(localStorage.getItem("inv"))||{};

function getColor(letter){
  if(letter==="0") return "darkred";

  const i=letters.indexOf(letter);
  const rank=Math.floor(i/3);

  const colors=[
    "#2ecc71","#27ae60","#a3e635",
    "#f1c40f","#f39c12","#e67e22",
    "#e74c3c","#c0392b","#ff0000"
  ];

  return colors[rank]||"#aaa";
}

function load(){
  const list=document.getElementById("list");
  list.innerHTML="";

  Object.entries(inventory)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([k,v])=>{
      const div=document.createElement("div");
      div.className="item";
      div.innerHTML=`<span style="color:${getColor(k)}">${k}</span><span style="color:${getColor(k)}">x${v}</span>`;
      list.appendChild(div);
    });
}

load();
</script>

</body>
</html>
