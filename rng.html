<!DOCTYPE html>
<html>
<head>
  <title>RNG Game</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    .screen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    .active {
      display: flex;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      background: #222;
      border: 1px solid #444;
      color: white;
      cursor: pointer;
    }

    /* RNG UI */
    .layout {
      display: flex;
      gap: 60px;
      align-items: center;
    }

    #output {
      width: 200px;
      height: 200px;
      background: #111;
      border: 2px solid #333;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 90px;
    }

    .lever {
      width: 14px;
      height: 160px;
      background: #aa0000;
      position: relative;
      border-radius: 6px;
      cursor: pointer;
    }

    .handle {
      width: 36px;
      height: 36px;
      background: red;
      border-radius: 50%;
      position: absolute;
      top: -10px;
      left: -11px;
    }

    .pulled .handle {
      top: 110px;
    }

    .board {
      width: 200px;
      height: 300px;
      background: #111;
      border: 1px solid #333;
      padding: 10px;
      overflow-y: auto;
    }

    .topbar {
      position: absolute;
      top: 10px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
    }
  </style>
</head>

<body>

<!-- MENU -->
<div class="screen active" id="menu">
  <h1>RNG HUB</h1>
  <button onclick="show('rng')">Play RNG</button>
</div>

<!-- RNG -->
<div class="screen" id="rng">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <button onclick="toggleAuto()">Auto Roll: <span id="autoState">OFF</span></button>
    </div>

    <div>
      <button onclick="goMenu()">✖</button>
    </div>
  </div>

  <div class="layout">

    <div class="lever" onclick="roll(this)">
      <div class="handle"></div>
    </div>

    <div id="output">-</div>

    <div class="board">
      <h3>Inventory</h3>
      <div id="list"></div>
    </div>

  </div>
</div>

<script>
  // SCREEN SYSTEM
  function show(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // DATA
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  let stats = JSON.parse(localStorage.getItem("stats")) || {};
  let inventory = JSON.parse(localStorage.getItem("inv")) || {};

  function save(){
    localStorage.setItem("stats", JSON.stringify(stats));
    localStorage.setItem("inv", JSON.stringify(inventory));
  }

  function updateInventory(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    Object.entries(inventory)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([k,v])=>{
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<span>${k}</span><span>x${v}</span>`;
        list.appendChild(div);
      });
  }

  // ROLL SYSTEM
  function roll(lever){
    const out = document.getElementById("output");

    lever.classList.add("pulled");

    let i = 0;
    const spin = setInterval(()=>{
      out.textContent = letters[Math.floor(Math.random()*letters.length)];
      i++;

      if(i > 12){
        clearInterval(spin);
        lever.classList.remove("pulled");

        const pick = Math.random() < 1/220 ? "0" : letters[Math.floor(Math.random()*letters.length)];

        stats[pick] = (stats[pick] || 0) + 1;
        inventory[pick] = (inventory[pick] || 0) + 1;

        out.textContent = pick;

        save();
        updateInventory();
      }
    },70);
  }

  // AUTO ROLL
  let autoRolling = false;
  let autoInterval = null;

  function toggleAuto(){
    autoRolling = !autoRolling;

    document.getElementById("autoState").textContent =
      autoRolling ? "ON" : "OFF";

    if(autoRolling){
      autoInterval = setInterval(()=>{
        roll(document.querySelector(".lever"));
      }, 1500);
    } else {
      clearInterval(autoInterval);
    }
  }

  // BACK TO MENU
  function goMenu(){
    show("menu");
    autoRolling = false;
    clearInterval(autoInterval);
    document.getElementById("autoState").textContent = "OFF";
  }

  updateInventory();
</script>

</body>
</html>
