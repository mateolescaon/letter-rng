<!DOCTYPE html>
<html>
<head>
  <title>RNG Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      width: 420px;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    #output {
      width: 160px;
      height: 160px;
      margin: 20px auto;
      border-radius: 12px;
      border: 2px solid #ddd;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 60px;
      background: #fafafa;
    }

    button {
      padding: 10px 14px;
      margin: 6px;
      border: none;
      border-radius: 8px;
      background: #1a73e8;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1558b0;
    }

    .secondary {
      background: #eee;
      color: #333;
    }

    .secondary:hover {
      background: #ddd;
    }

    .layout {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 15px;
    }

    .box {
      flex: 1;
      background: #fafafa;
      border-radius: 10px;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
      border: 1px solid #eee;
      font-size: 13px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="topbar">
    <button class="secondary" onclick="goMenu()">← Menu</button>
    <button class="secondary" onclick="toggleAuto()">
      Auto: <span id="autoState">OFF</span>
    </button>
  </div>

  <h1>RNG Game</h1>

  <div id="output">-</div>

  <button onclick="roll()">Roll</button>

  <div class="layout">
    <div class="box">
      <b>Inventory</b>
      <div id="inv"></div>
    </div>

    <div class="box">
      <b>Stats</b>
      <div id="stats"></div>
    </div>
  </div>

</div>

<script>
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

  let stats = JSON.parse(localStorage.getItem("stats")) || {};
  let inv = JSON.parse(localStorage.getItem("inv")) || {};

  function save(){
    localStorage.setItem("stats", JSON.stringify(stats));
    localStorage.setItem("inv", JSON.stringify(inv));
  }

  function roll(){
    const pick = Math.random() < 0.03 ? "0" : letters[Math.floor(Math.random()*letters.length)];

    stats[pick] = (stats[pick] || 0) + 1;
    inv[pick] = (inv[pick] || 0) + 1;

    document.getElementById("output").textContent = pick;

    save();
    render();
  }

  function render(){
    const invBox = document.getElementById("inv");
    const statsBox = document.getElementById("stats");

    invBox.innerHTML = "";
    statsBox.innerHTML = "";

    Object.entries(inv).forEach(([k,v])=>{
      invBox.innerHTML += `<div class="item"><span>${k}</span><span>${v}</span></div>`;
    });

    Object.entries(stats).forEach(([k,v])=>{
      statsBox.innerHTML += `<div class="item"><span>${k}</span><span>${v}</span></div>`;
    });
  }

  let auto = false;
  let interval;

  function toggleAuto(){
    auto = !auto;
    document.getElementById("autoState").textContent = auto ? "ON" : "OFF";

    if(auto){
      interval = setInterval(roll, 1200);
    } else {
      clearInterval(interval);
    }
  }

  function goMenu(){
    window.location.href = "index.html";
  }

  render();
</script>

</body>
</html>
