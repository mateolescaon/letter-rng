<!DOCTYPE html>
<html>
<head>
  <title>RNG Leaderboard</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      font-family: Arial;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .layout {
      display: flex;
      gap: 60px;
      align-items: center;
    }

    /* LEVER (same style, slightly cleaner) */
    .lever {
      width: 14px;
      height: 160px;
      background: #aa0000;
      border-radius: 6px;
      position: relative;
      cursor: pointer;
      transition: 0.1s;
    }

    .handle {
      width: 36px;
      height: 36px;
      background: #ff0000;
      border-radius: 50%;
      position: absolute;
      top: -10px;
      left: -11px;
    }

    .pulled .handle {
      top: 110px;
    }

    /* MACHINE (same, cleaner border) */
    .machine {
      text-align: center;
    }

    #output {
      width: 220px;
      height: 220px;
      background: #0a0a0a;
      border: 2px solid #222;
      border-radius: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 110px;
    }

    #rarity {
      margin-top: 10px;
      color: #aaa;
    }

    /* RIGHT PANEL (inventory/leaderboard style) */
    .board {
      width: 220px;
      height: 320px;
      background: #0a0a0a;
      border: 2px solid #222;
      padding: 10px;
      font-size: 14px;
      overflow-y: auto;
      border-radius: 10px;
    }

    .title {
      margin-bottom: 10px;
      font-weight: bold;
      color: #fff;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      color: #ccc;
    }

    .zero {
      color: darkred;
    }

    /* TOP BUTTONS */
    .topbar {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 10px;
    }

    button {
      background: #111;
      border: 1px solid #333;
      color: white;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #1a1a1a;
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button onclick="toggleAuto()">Auto: <span id="autoState">OFF</span></button>
  <button onclick="resetAll()">Reset</button>
</div>

<div class="layout">

  <!-- LEFT LEVER -->
  <div class="lever" onclick="roll(this)">
    <div class="handle"></div>
  </div>

  <!-- CENTER MACHINE -->
  <div class="machine">
    <div id="output">-</div>
    <div id="rarity">Pull lever</div>
  </div>

  <!-- RIGHT INVENTORY (same position as old leaderboard) -->
  <div class="board">
    <div class="title">Inventory</div>
    <div id="list"></div>
  </div>

</div>

<script>
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

  // ORIGINAL LOGIC (UNCHANGED)
  let stats = JSON.parse(localStorage.getItem("stats")) || {};
  let inventory = JSON.parse(localStorage.getItem("inv")) || {};

  letters.forEach(l => {
    if (!stats[l]) stats[l] = 0;
    if (!inventory[l]) inventory[l] = 0;
  });
  if (!stats["0"]) stats["0"] = 0;
  if (!inventory["0"]) inventory["0"] = 0;

  function save(){
    localStorage.setItem("stats", JSON.stringify(stats));
    localStorage.setItem("inv", JSON.stringify(inventory));
  }

  function getRank(letter){
    if(letter === "0") return 10;
    return Math.floor(letters.indexOf(letter) / 3) + 1;
  }

  function updateBoard(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    Object.entries(inventory)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([k,v])=>{
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<span>${k}</span><span>x${v}</span>`;
        if(k === "0") div.classList.add("zero");
        list.appendChild(div);
      });
  }

  function roll(lever){
    const output = document.getElementById("output");
    const rarity = document.getElementById("rarity");

    lever.classList.add("pulled");

    let spins = 0;

    const spin = setInterval(() => {
      output.textContent = letters[Math.floor(Math.random()*letters.length)];
      spins++;

      if(spins > 12){
        clearInterval(spin);
        lever.classList.remove("pulled");

        const pick = Math.random() < 1/220
          ? "0"
          : letters[Math.floor(Math.random()*letters.length)];

        stats[pick]++;
        inventory[pick]++;

        output.textContent = pick;
        rarity.textContent = (pick === "0")
          ? "MYTHIC (0)"
          : "Rank " + getRank(pick);

        save();
        updateBoard();
      }
    },70);
  }

  // AUTO ROLL (added, no gameplay change)
  let auto = false;
  let interval;

  function toggleAuto(){
    auto = !auto;
    document.getElementById("autoState").textContent = auto ? "ON" : "OFF";

    if(auto){
      interval = setInterval(()=>roll(document.querySelector(".lever")), 1200);
    } else {
      clearInterval(interval);
    }
  }

  function resetAll(){
    if(confirm("Reset everything?")){
      localStorage.clear();
      location.reload();
    }
  }

  updateBoard();
</script>

</body>
</html>
