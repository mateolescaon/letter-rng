<!DOCTYPE html>
<html>
<head>
  <title>RNG</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .layout {
      display: flex;
      gap: 60px;
      align-items: center;
    }

    .lever {
      width: 14px;
      height: 160px;
      background: #aa0000;
      border-radius: 6px;
      position: relative;
      cursor: pointer;
    }

    .handle {
      width: 36px;
      height: 36px;
      background: red;
      border-radius: 50%;
      position: absolute;
      top: -10px;
      left: -11px;
    }

    .pulled .handle {
      top: 110px;
    }

    #output {
      width: 220px;
      height: 220px;
      background: #111;
      border: 2px solid #333;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 100px;
    }

    .board {
      width: 200px;
      height: 300px;
      background: #111;
      border: 1px solid #333;
      padding: 10px;
      overflow-y: auto;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<div class="layout">

  <div class="lever" onclick="roll(this)">
    <div class="handle"></div>
  </div>

  <div>
    <div id="output">-</div>
    <div id="rarity"></div>
  </div>

  <div class="board">
    <b>Inventory</b>
    <div id="list"></div>
  </div>

</div>

<script>
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

let stats = JSON.parse(localStorage.getItem("stats")) || {};
let inventory = JSON.parse(localStorage.getItem("inv")) || {};

letters.forEach(l => {
  if (!stats[l]) stats[l] = 0;
  if (!inventory[l]) inventory[l] = 0;
});
if (!stats["0"]) stats["0"] = 0;
if (!inventory["0"]) inventory["0"] = 0;

function save(){
  localStorage.setItem("stats", JSON.stringify(stats));
  localStorage.setItem("inv", JSON.stringify(inventory));
}

function getRank(letter){
  if(letter === "0") return 10;
  return Math.floor(letters.indexOf(letter) / 3) + 1;
}

function getColor(letter){
  if(letter === "0") return "darkred";

  const i = letters.indexOf(letter);
  const rank = Math.floor(i / 3);

  const colors = [
    "#2ecc71","#27ae60","#a3e635",
    "#f1c40f","#f39c12","#e67e22",
    "#e74c3c","#c0392b","#ff0000"
  ];

  return colors[rank] || "#aaa";
}

function updateBoard(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  Object.entries(inventory)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([k,v])=>{
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `<span>${k}</span><span>x${v}</span>`;
      list.appendChild(div);
    });
}

function roll(lever){
  const output = document.getElementById("output");
  const rarity = document.getElementById("rarity");

  lever.classList.add("pulled");

  let spins = 0;

  const spin = setInterval(() => {
    const val = letters[Math.floor(Math.random()*letters.length)];
    output.textContent = val;
    output.style.color = getColor(val);

    spins++;

    if(spins > 22){
      clearInterval(spin);
      lever.classList.remove("pulled");

      const pick = Math.random() < 1/220
        ? "0"
        : letters[Math.floor(Math.random()*letters.length)];

      stats[pick]++;
      inventory[pick]++;

      output.textContent = pick;
      output.style.color = getColor(pick);

      rarity.textContent = pick === "0"
        ? "MYTHIC (0)"
        : "Rank " + getRank(pick);

      save();
      updateBoard();
    }
  }, 60);
}

updateBoard();
</script>

</body>
</html>
